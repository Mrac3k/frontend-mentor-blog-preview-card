<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Card</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/favicon-32x32.png" sizes="32x32" type="image/png">
</head>
<body>
    <main>
        <div class="card__profile container">
            <img src="./assets/illustration-article.svg" alt="Background image" class="card__profile--image">
            <div class="card__profile--content">
                <h1 class="card__profile--information">Learning</h1>
                <p class="card__profile--description">Published on June 24, 2026</p>
            </div>

            <div class="card__profile--text">
                <h2 class="card__profile--text-title">HTML & CSS Foundations</h2>
                <p class="card__profile--text-description">These languages are the blackbone of every website, defining structure, content, and presentation.</p>
            </div>

            <div class="card__profile--author">
                <img src="./assets/image-avatar.webp" alt="Author image" class="card__profile--author-image">
                <p class="card__profile--author-name">Greg Hooper</p>
            </div>

        </div>
    </main>
</body>
</html>
